<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | prepend: site.baseurl }}">
  <link rel="shortcut icon" type="image/png" href="{{ '/assets/favicon.png' }}" >
  <script src="https://kit.fontawesome.com/a09c14740d.js" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">

  <style>
    /* Default Dark Mode Variables */
    :root {
        --bg-color: #000000;
        --card-bg: #1c1c1e;
        --text-primary: #ffffff;
        --text-secondary: #a1a1a6;
        --accent: #0a84ff;
        --accent-rgb: 10, 132, 255;
        --grid-border: rgba(255, 255, 255, 0.1);
        --card-shadow: 0 4px 16px rgba(0,0,0,0.4);
        --card-hover-shadow: 0 8px 32px rgba(0,0,0,0.6);
        --border-radius: 28px;
        --hero-gradient: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%);
    }

    /* Light Mode Variables override */
    [data-theme="light"] {
        --bg-color: #f2f2f7;
        --card-bg: #ffffff;
        --text-primary: #1d1d1f;
        --text-secondary: #86868b;
        --accent: #0071e3;
        --accent-rgb: 0, 113, 227;
        --grid-border: rgba(0, 0, 0, 0.05);
        --card-shadow: 0 2px 12px rgba(0,0,0,0.04);
        --card-hover-shadow: 0 8px 24px rgba(0,0,0,0.08);
        --hero-gradient: linear-gradient(135deg, #ffffff 0%, #f9f9fb 100%);
    }

    body {
        background-color: var(--bg-color);
        color: var(--text-primary);
        transition: background-color 0.3s ease, color 0.3s ease;
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
  </style>
</head>
