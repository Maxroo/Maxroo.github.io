<style>
  .site-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid rgba(0,0,0,0.1);
    transition: background 0.3s, border-color 0.3s;
  }

  .nav-logo {
    font-weight: 800;
    font-size: 1.2rem;
    text-decoration: none;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 30px;
  }

  .nav-links {
    display: flex;
    gap: 30px;
  }

  .nav-link {
    text-decoration: none;
    color: var(--text-secondary);
    font-size: 0.9rem;
    font-weight: 500;
    transition: color 0.2s;
  }

  .nav-link:hover {
    color: var(--accent);
    text-decoration: none;
  }

  /* Theme Toggle Button */
  .theme-toggle {
    background: rgba(var(--accent-rgb), 0.1);
    border: 1px solid var(--grid-border);
    color: var(--text-primary);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 8px 12px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.3s ease;
  }

  .theme-toggle:hover {
    background: rgba(var(--accent-rgb), 0.2);
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .theme-toggle i {
    width: 1.2rem;
    text-align: center;
  }

  [data-theme="light"] .fa-sun { display: none; }
  [data-theme="dark"] .fa-moon { display: none; }
  
  /* Initial state if no theme set (defaults to dark) */
  body:not([data-theme]) .fa-moon { display: none; }

  /* Adjust navigation on home page to blend with the bento hero */
  .is-home .site-nav {
    border-bottom: none;
    width: 100%;
  }
</style>

<nav class="site-nav">
  <a href="{{ '/' | relative_url }}" class="nav-logo">Hao-Tse Wu</a>
  
  <div class="nav-right">
    <div class="nav-links">
      <a href="{{ '/game_project.html' | relative_url }}" class="nav-link">Games</a>
      <a href="{{ '/other_projects.html' | relative_url }}" class="nav-link">Studies</a>
      <a href="{{ '/aboutMe.html' | relative_url }}" class="nav-link">About</a>
    </div>

    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
      <i class="fas fa-sun"></i>
      <i class="fas fa-moon"></i>
      <span>Theme</span>
    </button>
  </div>
</nav>

<script>
  const toggleBtn = document.getElementById('theme-toggle');
  const body = document.body;
  
  // Set default theme to dark if not set
  if (!localStorage.getItem('theme')) {
    localStorage.setItem('theme', 'dark');
  }
  
  const currentTheme = localStorage.getItem('theme');
  if (currentTheme) {
    body.setAttribute('data-theme', currentTheme);
  }

  toggleBtn.addEventListener('click', () => {
    let theme = body.getAttribute('data-theme');
    if (theme === 'dark') {
      theme = 'light';
    } else {
      theme = 'dark';
    }
    body.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
  });
</script>
